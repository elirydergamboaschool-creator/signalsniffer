name: Build Signal Scanner FAP

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build FAP with ufbt
        uses: nicowillis/build-flipper-application-package@v1
        with:
          app-dir: .

      - name: Upload .fap as artifact
        uses: actions/upload-artifact@v4
        with:
          name: signal_scanner.fap
          path: dist/*.fap
